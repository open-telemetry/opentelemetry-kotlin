name: Regenerate semantic conventions

# Regenerates the Kotlin sources in the semconv modules whenever relevant files change

on:
  pull_request:
    paths:
      - 'gradle/libs.versions.toml'
      - 'semconv/templates/**'

permissions:
  contents: read

env:
  WEAVER_VERSION: v0.24.2

jobs:
  regenerate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.otelbot-token.outputs.token }}

      - name: Install weaver
        run: |
          echo "Installing weaver $WEAVER_VERSION"
          gh release download "$WEAVER_VERSION" \
            --repo open-telemetry/weaver \
            --pattern '*x86_64-unknown-linux-gnu.tar.xz' \
            --output weaver.tar.xz
          tar -xJf weaver.tar.xz --strip-components 1
          mv weaver /usr/local/bin/weaver
          weaver --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'adopt'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Regenerate semantic conventions
        run: ./gradlew :semconv:generateSemanticConventions :semconv-end-user-client:generateSemanticConventions --stacktrace

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-github-bot.sh

      - name: Push regenerated sources
        run: |
          if [[ -n "$(git status --porcelain semconv/src semconv-end-user-client/src)" ]]; then
            git add semconv/src semconv-end-user-client/src
            git commit -m "Regenerate semantic conventions"
            git push
          else
            echo "Generated sources are up to date."
          fi
